<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KY设备管理系统 - 测试页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .test-result {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
    }
    .success {
      background: #f0f9ff;
      border-left: 4px solid #4caf50;
      color: #2e7d32;
    }
    .error {
      background: #ffebee;
      border-left: 4px solid #f44336;
      color: #c62828;
    }
    .info {
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
      color: #1565c0;
    }
    code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>KY设备管理系统 - 系统检查</h1>
    
    <div id="results"></div>
  </div>

  <script>
    const results = document.getElementById('results');

    function addResult(message, type = 'info') {
      const div = document.createElement('div');
      div.className = `test-result ${type}`;
      div.textContent = message;
      results.appendChild(div);
    }

    // 检查浏览器特性
    addResult('开始系统检查...', 'info');

    // 1. 检查JavaScript语法支持
    try {
      // 测试可选链操作符
      const obj = { a: { b: 1 } };
      const test = obj?.a?.b;
      addResult('✓ 可选链操作符支持正常', 'success');
    } catch (e) {
      addResult(`✗ 可选链操作符不支持: ${e.message}`, 'error');
    }

    // 2. 检查空值合并操作符
    try {
      const test = null ?? 'default';
      addResult('✓ 空值合并操作符支持正常', 'success');
    } catch (e) {
      addResult(`✗ 空值合并操作符不支持: ${e.message}`, 'error');
    }

    // 3. 检查ES6特性
    try {
      const arrow = () => 'test';
      const [a, b] = [1, 2];
      const { c } = { c: 3 };
      addResult('✓ ES6特性支持正常', 'success');
    } catch (e) {
      addResult(`✗ ES6特性不支持: ${e.message}`, 'error');
    }

    // 4. 检查JSON解析
    try {
      const json = JSON.parse('{"key": "value"}');
      addResult('✓ JSON解析支持正常', 'success');
    } catch (e) {
      addResult(`✗ JSON解析不支持: ${e.message}`, 'error');
    }

    // 5. 检查WebSocket支持
    try {
      const wsSupported = typeof WebSocket !== 'undefined';
      if (wsSupported) {
        addResult('✓ WebSocket支持正常', 'success');
      } else {
        addResult('✗ WebSocket不支持', 'error');
      }
    } catch (e) {
      addResult(`✗ WebSocket检查失败: ${e.message}`, 'error');
    }

    // 6. 检查模块支持
    try {
      addResult('✓ ES模块支持正常（通过type="module"加载）', 'success');
    } catch (e) {
      addResult(`✗ ES模块不支持: ${e.message}`, 'error');
    }

    addResult('系统检查完成。如果所有测试都通过，说明浏览器环境正常。', 'info');
  </script>
</body>
</html>
