<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手持察打一体设备 - 反无人机操作控制系统</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
      // 强制检查版本，如果本地存储的版本号与当前不同，强制刷新
      const VERSION = '202603251210';
      if (localStorage.getItem('app_version') !== VERSION) {
        localStorage.setItem('app_version', VERSION);
        // 强制重新加载（绕过缓存）
        if (!location.search.includes('v=')) {
          location.href = location.pathname + '?v=' + VERSION;
        }
      }
    </script>
    <style>
      /* ========== 日期选择器全局样式覆盖 - 最高优先级 ========== */
      
      /* 弹出面板容器 - 显示在输入框下方 */
      .picker-wrapper .el-picker__popper.el-popper,
      .datetime-picker-popper.el-popper,
      .el-picker__popper.el-popper {
        position: absolute !important;
        left: 0 !important;
        top: 100% !important;
        bottom: auto !important;
        right: auto !important;
        margin-top: 4px !important;
        margin-bottom: 0 !important;
        transform: none !important;
        inset: auto !important;
        width: 290px !important;
        max-height: 340px !important;
        overflow: visible !important;
      }
      
      /* 面板主体 */
      .el-picker__popper .el-picker-panel {
        width: 290px !important;
        min-width: 290px !important;
      }
      
      /* 面板内容区域 */
      .el-picker__popper .el-picker-panel__body {
        padding: 8px !important;
      }
      
      /* 头部区域 */
      .el-picker__popper .el-date-picker__header {
        padding: 8px 10px !important;
        margin: 0 !important;
      }
      
      /* ========== 年份选择器关键修复 ========== */
      
      /* 年份表格 - 固定表格布局 */
      .el-picker__popper .el-year-table {
        table-layout: fixed !important;
        width: 270px !important;
        border-collapse: separate !important;
        border-spacing: 2px !important;
      }
      
      /* 年份单元格 - 每行4个，固定宽度 */
      .el-picker__popper .el-year-table td {
        width: 65px !important;
        min-width: 65px !important;
        max-width: 65px !important;
        height: 40px !important;
        padding: 0 !important;
        text-align: center !important;
        box-sizing: border-box !important;
        vertical-align: middle !important;
      }
      
      /* 年份单元格内容 - 核心修复：不换行 */
      .el-picker__popper .el-year-table td .cell {
        display: inline-block !important;
        width: 60px !important;
        min-width: 60px !important;
        max-width: 60px !important;
        padding: 0 !important;
        text-align: center !important;
        white-space: nowrap !important;
        overflow: visible !important;
        font-size: 14px !important;
        font-weight: 400 !important;
        line-height: 36px !important;
        height: 36px !important;
      }
      
      /* ========== 月份选择器 ========== */
      
      .el-picker__popper .el-month-table {
        table-layout: fixed !important;
        width: 270px !important;
      }
      
      .el-picker__popper .el-month-table td {
        width: 65px !important;
        min-width: 65px !important;
        height: 40px !important;
        padding: 0 !important;
        text-align: center !important;
      }
      
      .el-picker__popper .el-month-table td .cell {
        display: inline-block !important;
        width: 54px !important;
        min-width: 54px !important;
        text-align: center !important;
        white-space: nowrap !important;
        font-size: 13px !important;
        line-height: 36px !important;
        height: 36px !important;
      }
      
      /* ========== 日期表格 ========== */
      
      .el-picker__popper .el-date-table {
        font-size: 12px !important;
      }
      
      .el-picker__popper .el-date-table td {
        padding: 2px 0 !important;
        width: 36px !important;
        height: 28px !important;
      }
      
      .el-picker__popper .el-date-table td .el-date-table-cell {
        height: 24px !important;
        padding: 0 2px !important;
      }
      
      /* ========== 时间面板 ========== */
      
      .el-picker__popper .el-time-panel {
        padding: 8px !important;
        width: 100% !important;
      }
      
      .el-picker__popper .el-time-spinner__item {
        font-size: 12px !important;
        height: 28px !important;
        line-height: 28px !important;
      }
      
      /* ========== 底部按钮区 ========== */
      
      .el-picker__popper .el-picker-panel__footer {
        padding: 8px 12px !important;
        border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
      }
      
      .el-picker__popper .el-picker-panel__footer .el-button {
        font-size: 12px !important;
        padding: 6px 16px !important;
        height: 28px !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
