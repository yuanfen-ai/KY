<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手持察打一体设备 - 反无人机操作控制系统</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
      // 强制检查版本，如果本地存储的版本号与当前不同，强制刷新
      const VERSION = '202603251835';
      if (localStorage.getItem('app_version') !== VERSION) {
        localStorage.setItem('app_version', VERSION);
        // 强制重新加载（绕过缓存）
        if (!location.search.includes('v=')) {
          location.href = location.pathname + '?v=' + VERSION;
        }
      }
    </script>
    <style>
      /* ========== 日期选择器全局样式覆盖 - 最高优先级 ========== */
      
      /* 弹出面板容器 */
      .picker-wrapper .el-picker__popper.el-popper,
      .datetime-picker-popper.el-popper,
      .el-picker__popper.el-popper {
        position: absolute !important;
        left: 0 !important;
        top: 100% !important;
        bottom: auto !important;
        right: auto !important;
        margin-top: 4px !important;
        margin-bottom: 0 !important;
        transform: none !important;
        inset: auto !important;
        width: 320px !important;
        max-height: none !important;
        overflow: visible !important;
        box-sizing: border-box !important;
      }
      
      /* 面板主体 */
      .el-picker__popper .el-picker-panel {
        width: 100% !important;
        box-sizing: border-box !important;
      }
      
      /* 面板内容区域 */
      .el-picker__popper .el-picker-panel__body {
        padding: 6px !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
      
      /* 面板内容区域 - 包含日期和时间输入框 */
      .el-picker__popper .el-picker-panel__content {
        padding: 0 !important;
        margin: 0 !important;
      }
      
      /* ========== 日期时间选择器顶部输入框区域 ========== */
      
      /* 日期时间选择器的时间头部区域 */
      .el-picker__popper .el-date-picker__time-header {
        padding: 6px !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        display: flex !important;
        flex-wrap: nowrap !important;
        justify-content: space-between !important;
        align-items: center !important;
        gap: 6px !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
      
      /* 日期输入框容器 */
      .el-picker__popper .el-date-picker__editor-wrap {
        flex: 1 1 auto !important;
        min-width: 0 !important;
        max-width: 50% !important;
        box-sizing: border-box !important;
      }
      
      .el-picker__popper .el-date-picker__editor-wrap .el-input {
        width: 100% !important;
        box-sizing: border-box !important;
      }
      
      .el-picker__popper .el-date-picker__editor-wrap .el-input__wrapper {
        width: 100% !important;
        padding: 0 4px !important;
        box-sizing: border-box !important;
      }
      
      .el-picker__popper .el-date-picker__editor-wrap .el-input__inner {
        font-size: 12px !important;
        padding: 0 !important;
        text-align: center !important;
      }
      
      /* 头部区域 - 年月选择 */
      .el-picker__popper .el-date-picker__header {
        padding: 6px !important;
        margin: 0 !important;
        line-height: 24px !important;
      }
      
      /* 年月标签 */
      .el-picker__popper .el-date-picker__header-label {
        font-size: 14px !important;
        font-weight: 500 !important;
        padding: 0 4px !important;
      }
      
      /* ========== 年份选择器 - 紧凑布局 ========== */
      
      /* 年份表格 - 固定表格布局 */
      .el-picker__popper .el-year-table {
        table-layout: fixed !important;
        width: 100% !important;
        border-collapse: collapse !important;
        border-spacing: 0 !important;
      }
      
      /* 年份单元格 - 每行4个，紧凑间距 */
      .el-picker__popper .el-year-table td {
        width: 25% !important;
        height: 32px !important;
        padding: 0 !important;
        margin: 0 !important;
        text-align: center !important;
        box-sizing: border-box !important;
        vertical-align: middle !important;
        border: none !important;
      }
      
      /* 年份单元格容器 */
      .el-picker__popper .el-year-table td .el-date-table-cell {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 100% !important;
        height: 28px !important;
        padding: 0 !important;
        box-sizing: border-box !important;
      }
      
      /* 年份文字 - 关键：强制不换行 */
      .el-picker__popper .el-year-table td .el-date-table-cell__text {
        display: inline-block !important;
        white-space: nowrap !important;
        word-break: keep-all !important;
        font-size: 14px !important;
        line-height: 28px !important;
        padding: 0 4px !important;
      }
      
      /* ========== 月份选择器 - 紧凑布局 ========== */
      
      /* 月份表格 - 固定表格布局 */
      .el-picker__popper .el-month-table {
        table-layout: fixed !important;
        width: 100% !important;
        border-collapse: collapse !important;
        border-spacing: 0 !important;
      }
      
      /* 月份单元格 - 紧凑间距 */
      .el-picker__popper .el-month-table td {
        width: 25% !important;
        height: 32px !important;
        padding: 0 !important;
        margin: 0 !important;
        text-align: center !important;
        box-sizing: border-box !important;
        vertical-align: middle !important;
        border: none !important;
      }
      
      /* 月份单元格容器 */
      .el-picker__popper .el-month-table td .el-date-table-cell {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        width: 100% !important;
        height: 28px !important;
        padding: 0 !important;
        box-sizing: border-box !important;
      }
      
      /* 月份文字 - 关键：强制不换行 */
      .el-picker__popper .el-month-table td .el-date-table-cell__text {
        display: inline-block !important;
        white-space: nowrap !important;
        word-break: keep-all !important;
        font-size: 14px !important;
        line-height: 28px !important;
        padding: 0 4px !important;
      }
      
      /* ========== 日期表格 ========== */
      
      .el-picker__popper .el-date-table {
        table-layout: fixed !important;
        width: 100% !important;
        font-size: 13px !important;
        border-collapse: collapse !important;
        border-spacing: 0 !important;
        margin-top: 0 !important;
      }
      
      /* 星期表头 */
      .el-picker__popper .el-date-table th {
        padding: 4px 0 !important;
        font-size: 13px !important;
        font-weight: 400 !important;
        line-height: 20px !important;
      }
      
      .el-picker__popper .el-date-table td {
        padding: 0 !important;
        width: auto !important;
        height: 26px !important;
      }
      
      .el-picker__popper .el-date-table td .el-date-table-cell {
        height: 24px !important;
        padding: 0 !important;
      }
      
      /* ========== 时间面板 ========== */
      
      .el-picker__popper .el-time-panel {
        padding: 6px !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
      
      .el-picker__popper .el-time-spinner__item {
        font-size: 13px !important;
        height: 26px !important;
        line-height: 26px !important;
      }
      
      /* ========== 底部按钮区 ========== */
      
      .el-picker__popper .el-picker-panel__footer {
        padding: 6px !important;
        border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
      }
      
      .el-picker__popper .el-picker-panel__footer .el-button {
        font-size: 13px !important;
        padding: 5px 12px !important;
        height: 26px !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
